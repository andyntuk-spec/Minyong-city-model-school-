<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard - Minyong School</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
    }

    h1 {
      background: #004080;
      color: white;
      padding: 15px;
    }

    .card {
      background: white;
      margin: 15px auto;
      padding: 15px;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
    }

    button {
      padding: 8px;
      margin: 5px;
      background: #004080;
      color: white;
      border: none;
    }
  </style>
</head>
<body>

<h1>Admin Dashboard</h1>

<!-- Logout button -->
<button onclick="logout()">Logout</button>

<div id="applications"></div>

<script>
  // Protect dashboard
  if(localStorage.getItem("loggedIn") !== "true"){
    window.location.href = "login.html";
  }

  let applications = JSON.parse(localStorage.getItem("applications")) || [];

  function displayApplications(){
    let container = document.getElementById("applications");
    container.innerHTML = "";

    if(applications.length === 0){
      container.innerHTML = "<p>No applications yet</p>";
      return;
    }

    applications.forEach((app, index) => {
      container.innerHTML += `
        <div class="card">
          <p><b>Name:</b> ${app.name}</p>
          <p><b>Age:</b> ${app.age}</p>
          <p><b>Class:</b> ${app.class}</p>
          <p><b>Phone:</b> ${app.phone}</p>

          <button onclick="callUser(${index})">Call</button>
          <button onclick="smsUser(${index})">SMS</button>
        </div>
      `;
    });
  }

  // 📞 Call function
  function callUser(i){
    let app = applications[i];
    window.location.href = `tel:${app.phone}`;
  }

  // 💬 SMS function
  function smsUser(i){
    let app = applications[i];

    let message = `Hello ${app.name}, your admission request has been received.`;

    window.location.href = `sms:${app.phone}?body=${encodeURIComponent(message)}`;
  }

  function logout(){
    localStorage.removeItem("loggedIn");
    window.location.href = "login.html";
  }

  displayApplications();
</script>

</body>
</html>
